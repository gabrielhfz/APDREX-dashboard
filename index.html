<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tablero APD - Rex</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --v:#6F05C1;--vd:#4D0797;--vl:#9B3FDE;
      --y:#FFCE00;--yd:#E6B800;
      --t:#00A693;--td:#007A6E;
      --bg:#F4F5F7;--surf:#FFFFFF;--surf2:#F0EEF8;
      --txt:#1D1D1B;--txt2:#5A5A6A;--brd:#E2E0ED;
      --sh:0 2px 12px rgba(111,5,193,.10);--shh:0 6px 24px rgba(111,5,193,.18);
      --r:14px;--rs:8px;
      --green:#1DB954;--orange:#FF8C00;--red:#E22626;--blue:#2957FF
    }
    html{font-size:16px}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

    /* ── Header ── */
    .hdr{background:linear-gradient(135deg,var(--vd) 0%,var(--v) 60%,var(--vl) 100%);color:#fff;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 3px 18px rgba(77,7,151,.35);min-height:64px;position:sticky;top:0;z-index:200}
    .hdr-brand{display:flex;align-items:center;gap:14px}
    .hdr-logo{height:42px;width:auto;display:block;background:#fff;border-radius:6px;padding:3px 8px;object-fit:contain}
    .hdr-title{font-size:1.05rem;font-weight:600;letter-spacing:.02em}
    .hdr-title span{font-weight:300;opacity:.75;font-size:.9rem}
    .hdr-meta{font-size:.75rem;opacity:.7;text-align:right;line-height:1.6}

    /* ── Period bar ── */
    .pbar{background:#fff;border-bottom:1px solid var(--brd);padding:10px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:64px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .pbar-sep{width:1px;height:22px;background:var(--brd);flex-shrink:0}
    .pbar-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txt2);white-space:nowrap}
    .ptabs{display:flex;gap:4px;background:var(--bg);border-radius:8px;padding:3px}
    .ptab{padding:6px 16px;border-radius:6px;border:none;background:transparent;font-size:.8rem;font-weight:600;cursor:pointer;color:var(--txt2);transition:all .2s}
    .ptab.active{background:var(--v);color:#fff;box-shadow:0 2px 8px rgba(111,5,193,.3)}
    .pselect{padding:7px 12px;border:1px solid var(--brd);border-radius:8px;font-size:.82rem;font-weight:500;color:var(--txt);background:#fff;cursor:pointer;min-width:240px;outline:none}
    .pselect:focus{border-color:var(--v);box-shadow:0 0 0 3px rgba(111,5,193,.12)}
    .prange{font-size:.75rem;color:var(--txt2);background:var(--surf2);padding:5px 10px;border-radius:6px;border:1px solid var(--brd);white-space:nowrap}

    /* ── Layout ── */
    .main{max-width:1200px;margin:0 auto;padding:24px 20px 48px}
    .sec{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--v);margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .sec::after{content:'';flex:1;height:2px;background:var(--brd);border-radius:2px}
    .sec-badge{background:var(--surf2);color:var(--v);font-size:.68rem;padding:2px 8px;border-radius:99px;border:1px solid var(--brd);font-weight:700;white-space:nowrap}

    /* ── KPI Cards ── */
    .kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
    .kcard{background:var(--surf);border-radius:var(--r);padding:18px 16px 14px;box-shadow:var(--sh);border:1px solid var(--brd);display:flex;flex-direction:column;gap:5px;position:relative;overflow:hidden;transition:box-shadow .2s,transform .2s}
    .kcard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r) var(--r) 0 0}
    .kcard.c-t::before{background:linear-gradient(90deg,var(--td),var(--t))}
    .kcard.c-v::before{background:linear-gradient(90deg,var(--vd),var(--vl))}
    .kcard.c-g::before{background:linear-gradient(90deg,#0D9E44,var(--green))}
    .kcard.c-o::before{background:linear-gradient(90deg,#cc6600,var(--orange))}
    .kcard.c-r::before{background:linear-gradient(90deg,#b01010,var(--red))}
    .kcard.c-b::before{background:linear-gradient(90deg,#1a3dcc,var(--blue))}
    .kcard.c-gr::before{background:linear-gradient(90deg,#666,#999)}
    .kcard:hover{box-shadow:var(--shh);transform:translateY(-2px)}
    .klabel{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--txt2)}
    .kval{font-size:2.1rem;font-weight:800;line-height:1}
    .kcard.c-t .kval{color:var(--td)}
    .kcard.c-v .kval{color:var(--v)}
    .kcard.c-g .kval{color:#0D9E44}
    .kcard.c-r .kval{color:var(--red)}
    .kcard.c-o .kval{color:#cc6600}
    .kcard.c-b .kval{color:#1a3dcc}
    .kcard.c-gr .kval{color:#555}
    .ksub{font-size:.73rem;color:var(--txt2);margin-top:1px}
    .kicon{position:absolute;top:14px;right:14px;font-size:1.1rem;font-weight:900;opacity:.09;letter-spacing:-.05em}

    /* ── Cards genéricas ── */
    .card{background:var(--surf);border-radius:var(--r);padding:22px 20px;box-shadow:var(--sh);border:1px solid var(--brd);margin-bottom:24px}
    .card-title{font-size:.85rem;font-weight:700;color:var(--txt);margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--v);flex-shrink:0}
    .dot-o{background:var(--orange)}
    .dot-t{background:var(--t)}

    /* ── Tabla analistas ── */
    .tbl-wrap{overflow-x:auto}
    .tbl{width:100%;border-collapse:collapse;font-size:.82rem}
    .tbl thead tr{background:linear-gradient(135deg,var(--vd),var(--v));color:#fff}
    .tbl thead th{padding:11px 13px;text-align:left;font-size:.68rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;white-space:nowrap}
    .tbl thead th:first-child{border-radius:var(--rs) 0 0 0}.tbl thead th:last-child{border-radius:0 var(--rs) 0 0}
    .tbl thead th.r,.tbl td.r{text-align:right}
    .tbl tbody tr{border-bottom:1px solid var(--brd);transition:background .15s}
    .tbl tbody tr:last-child{border-bottom:none}
    .tbl tbody tr:hover{background:var(--surf2)}
    .tbl td{padding:11px 13px;vertical-align:middle}
    .tbl tr.tr-tot{background:linear-gradient(90deg,#f5f0fc,#ede5f9)!important;font-weight:700;border-top:2px solid var(--v)}
    .tbl tr.tr-tot:hover{background:linear-gradient(90deg,#ede5f9,#e0d0f5)!important}
    .tbl tr.tr-tot2{background:linear-gradient(90deg,#e6f8f6,#d0f0ec)!important;font-weight:700;border-top:2px dashed var(--t)}
    .tbl tr.tr-tot2:hover{background:linear-gradient(90deg,#d0f0ec,#b8e8e3)!important}

    /* ── Badges y chips ── */
    .rb{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-weight:800;font-size:.75rem}
    .rb1{background:#FFD700;color:#7A5900}.rb2{background:#C0C0C0;color:#444}.rb3{background:#CD7F32;color:#fff}.rbn{background:var(--surf2);color:var(--txt2)}
    .chip{display:inline-block;padding:2px 8px;border-radius:6px;font-weight:700;font-size:.82rem}
    .chip-r{background:#fff0f0;color:var(--red)}
    .chip-o{background:#fff4e6;color:#cc6600}
    .chip-g{background:#f0fbf4;color:#0D9E44}
    .chip-t{background:#e6f8f6;color:var(--td)}
    .chip-gr{background:var(--surf2);color:var(--txt2)}
    .chip-v{background:#f0ebfc;color:#6F05C1}

    /* ── Progress bar ── */
    .pb-wrap{width:100%;min-width:80px;background:var(--bg);border-radius:99px;height:7px;overflow:hidden}
    .pb-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--vd),var(--vl))}

    /* ── Two-col layout ── */
    .twocol{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
    @media(max-width:780px){.twocol{grid-template-columns:1fr}}

    /* ── Proveedores ── */
    .prov-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:24px}
    .prov-card{background:var(--surf);border-radius:var(--rs);padding:14px 16px;box-shadow:var(--sh);border:1px solid var(--brd);border-left:4px solid var(--brd);transition:box-shadow .2s}
    .prov-card.alert{border-left-color:var(--red)}
    .prov-card.ok{border-left-color:var(--green)}
    .prov-card:hover{box-shadow:var(--shh)}
    .prov-name{font-size:.82rem;font-weight:700;color:var(--txt);margin-bottom:10px}
    .prov-stats{display:flex;flex-direction:column;gap:5px}
    .prov-stat{display:flex;justify-content:space-between;align-items:center;font-size:.78rem}
    .prov-stat-lbl{color:var(--txt2)}
    .prov-stat-val{font-weight:700;color:var(--txt)}
    .prov-total-card{background:linear-gradient(135deg,#f5f0fc,#ede5f9);border-color:var(--v)}

    /* ── Evolución ── */
    .evo-controls{display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:var(--surf);border-radius:var(--r);padding:14px 18px;border:1px solid var(--brd);box-shadow:var(--sh);margin-bottom:20px}
    .evo-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--txt2);white-space:nowrap}

    /* ── Misc ── */
    .loader{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:60px 20px;color:var(--txt2)}
    .spin{width:40px;height:40px;border:4px solid var(--brd);border-top-color:var(--v);border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .errbox{background:#FFF3F3;border:1px solid #FFAFAE;border-radius:var(--rs);padding:20px;color:var(--red);font-size:.9rem;text-align:center}
    .foot{text-align:center;font-size:.72rem;color:var(--txt2);padding:0 20px 28px;opacity:.65}

    /* ── Conclusiones ── */
    .concl-box{background:var(--surf);border-radius:var(--r);padding:22px 20px;border:1px solid var(--brd);box-shadow:var(--sh);margin-bottom:24px}
    .concl-title{font-size:.88rem;font-weight:700;color:var(--vd);margin-bottom:14px;display:flex;align-items:center;gap:8px}
    .concl-item{font-size:.82rem;color:var(--txt);padding:8px 12px 8px 14px;border-left:4px solid var(--brd);border-radius:0 var(--rs) var(--rs) 0;margin-bottom:6px;line-height:1.55}
    .concl-item:last-child{margin-bottom:0}
    .concl-ok{border-left-color:var(--green);background:#f0fbf4}
    .concl-warn{border-left-color:var(--orange);background:#fff4e6}
    .concl-bad{border-left-color:var(--red);background:#fff0f0}
    .concl-info{border-left-color:var(--blue);background:#f0f4ff}
    .concl-neutral{border-left-color:var(--v);background:var(--surf2)}

    /* ── Responsive ── */
    @media(max-width:600px){
      .hdr{padding:0 14px;min-height:56px}.hdr-logo{height:36px}
      .pbar{top:56px;padding:8px 14px;gap:8px}
      .main{padding:16px 12px 40px}.kval{font-size:1.7rem}
      .tbl td,.tbl th{padding:9px 8px}.pselect{min-width:160px}
    }
    @media(max-width:440px){.hdr-meta{display:none}.kgrid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>

<header class="hdr">
  <div class="hdr-brand">
    <img src="Rex_Log.jpg" alt="Rex" class="hdr-logo"/>
    <div><div class="hdr-title">Tablero APD <span>&middot; Aplicaciones y Desarrollos</span></div></div>
  </div>
  <div class="hdr-meta" id="hdrMeta">Cargando&hellip;</div>
</header>

<div class="pbar">
  <!-- Vista principal -->
  <div class="ptabs">
    <button class="ptab active" id="vTab0" onclick="setView('resumen')">&#9642; Resumen</button>
    <button class="ptab" id="vTab1" onclick="setView('evolucion')">&#8679; Evolución</button>
  </div>
  <div class="pbar-sep"></div>
  <!-- Controles de período (solo en Resumen) -->
  <div id="periodControls" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span class="pbar-label">Periodo</span>
    <div class="ptabs">
      <button class="ptab active" id="tabSem" onclick="setMode('semana')">Semana</button>
      <button class="ptab" id="tabMes" onclick="setMode('mes')">Mes</button>
    </div>
    <select class="pselect" id="pselect" onchange="onPeriodChange()"></select>
    <span class="prange" id="prange">Seleccionando...</span>
  </div>
</div>

<main class="main" id="mainContent">
  <div class="loader"><div class="spin"></div><span>Consultando indicadores&hellip;</span></div>
</main>
<footer class="foot" id="foot"></footer>

<script>
Chart.register(ChartDataLabels);

const API_BASE = 'https://api.somosrex.com/InfoExtra/KPI-APD';
const fmtN = n => (n || 0).toLocaleString('es-AR');
const pad  = n => String(n).padStart(2, '0');
const fmtD = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
const fmtL = d => d.toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric'});
const fmtLsh = d => d.toLocaleDateString('es-AR', {day:'2-digit',month:'2-digit'});
const nowStr = () => new Date().toLocaleString('es-AR', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});

let mode = 'semana';
let currentView = 'resumen';
let chartBar = null, chartStatus = null;
let chartEvoSec = null, chartEvoAna = null, chartEvoBalance = null;

// Cache para evolución
let evoCache = { sem: null, mes: null };
let evoPeriod = 'sem';
let evoViewMode = 'sector';
let anaMetric   = 'pend';   // 'pend' | 'entrsol'

// Colores para líneas de analistas en el chart de evolución
const ANA_COLORS = [
  '#6F05C1','#2957FF','#1DB954','#E22626','#FF8C00',
  '#00A693','#E91E8C','#795548','#607D8B','#FF5722','#9C27B0','#009688'
];

// ── Generadores de períodos ──────────────────────────────────────────
function getWeeks(n = 12) {
  const weeks = [], today = new Date();
  const dow = today.getDay();
  const dls = (dow === 0) ? 7 : dow;
  for (let i = 0; i < n; i++) {
    const sun = new Date(today); sun.setDate(today.getDate() - dls - i * 7);
    const mon = new Date(sun); mon.setDate(sun.getDate() - 6);
    weeks.push({
      desde: mon, hasta: sun,
      label: `Sem ${fmtL(mon)} - ${fmtL(sun)}` + (i === 0 ? ' (última cerrada)' : ''),
      labelShort: `${fmtLsh(mon)}-${fmtLsh(sun)}`
    });
  }
  return weeks;
}

function getMonths(n = 12) {
  const months = [], today = new Date();
  for (let i = 1; i <= n; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    const desde = new Date(d.getFullYear(), d.getMonth(), 1);
    const hasta = new Date(d.getFullYear(), d.getMonth() + 1, 0);
    const lbl = desde.toLocaleString('es-AR', {month:'long', year:'numeric'});
    const lblCap = lbl.charAt(0).toUpperCase() + lbl.slice(1);
    months.push({ desde, hasta, label: lblCap, labelShort: lblCap.split(' ')[0].slice(0,3) + ' ' + lblCap.split(' ')[2] });
  }
  return months;
}

// ── Control de vista principal ───────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('vTab0').classList.toggle('active', v === 'resumen');
  document.getElementById('vTab1').classList.toggle('active', v === 'evolucion');
  document.getElementById('periodControls').style.display = v === 'resumen' ? 'flex' : 'none';
  destroyCharts();
  if (v === 'resumen') {
    loadData();
  } else {
    loadEvolution();
  }
}

// ── Resumen: control de período ──────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('tabSem').classList.toggle('active', m === 'semana');
  document.getElementById('tabMes').classList.toggle('active', m === 'mes');
  populateSelect();
  loadData();
}
function populateSelect() {
  const sel = document.getElementById('pselect');
  sel.innerHTML = '';
  (mode === 'semana' ? getWeeks() : getMonths()).forEach((it, i) => {
    const o = document.createElement('option');
    o.value = i; o.textContent = it.label;
    sel.appendChild(o);
  });
}
function getSelected() {
  const i = parseInt(document.getElementById('pselect').value || '0');
  const items = mode === 'semana' ? getWeeks() : getMonths();
  return items[i] || items[0];
}
function onPeriodChange() { loadData(); }

// ── Fetch genérico a través del proxy ───────────────────────────────
async function fetchPeriod(p) {
  const PROXY = window.location.origin + '/proxy?url=';
  const apiRex = `${API_BASE}?buscaDato1=PENDIENTES&buscaDato2=${fmtD(p.desde)}&buscaDato3=${fmtD(p.hasta)}`;
  const r = await fetch(PROXY + encodeURIComponent(apiRex));
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// ── Destruir gráficos ────────────────────────────────────────────────
function destroyCharts() {
  if (chartBar)    { chartBar.destroy();    chartBar    = null; }
  if (chartStatus) { chartStatus.destroy(); chartStatus = null; }
  if (chartEvoSec)     { chartEvoSec.destroy();     chartEvoSec     = null; }
  if (chartEvoAna)     { chartEvoAna.destroy();     chartEvoAna     = null; }
  if (chartEvoBalance) { chartEvoBalance.destroy(); chartEvoBalance = null; }
}

// ── Resumen: carga y renderizado ─────────────────────────────────────
function loadData() {
  const p = getSelected();
  document.getElementById('prange').textContent = `${fmtL(p.desde)} al ${fmtL(p.hasta)}`;
  document.getElementById('mainContent').innerHTML =
    '<div class="loader"><div class="spin"></div><span>Cargando datos&hellip;</span></div>';
  destroyCharts();
  fetchPeriod(p)
    .then(data => render(data, p))
    .catch(e => showError(e.message));
}

function render(data, period) {
  if (!data || data.length === 0) {
    document.getElementById('mainContent').innerHTML = '<div class="errbox">No hay datos para el período seleccionado.</div>';
    return;
  }

  const grA   = data.filter(r => r.Gr === 'A');
  const grAP  = data.filter(r => r.Gr === 'AP');
  const tA    = grA.find(r => r.Od == 90) || {};
  const tA2   = grA.find(r => r.Od == 92) || {};
  const tAP   = grAP.find(r => r.Od == 90) || {};
  const anas  = grA.filter(r => r.Od != 90 && r.Od != 92).sort((a,b) => b.CantTkPend - a.CantTkPend);
  const provs = grAP.filter(r => r.Od != 90);
  const maxP  = anas[0]?.CantTkPend || 1;

  document.getElementById('hdrMeta').innerHTML = `Actualizado: <strong>${nowStr()}</strong>`;

  let h = '';

  // ── KPI Cards ───────────────────────────────────────────────────────
  // Orden: Sin Dup (1ero, teal) | Total Pend | En Proceso | Vencidos | En Espera | Solucionados
  h += `<div class="sec">Resumen del Periodo <span class="sec-badge">Analistas Internos · Gr=A</span></div>`;
  h += `<div class="kgrid">`;
  const kc = (cls, ico, lbl, val, sub) =>
    `<div class="kcard ${cls}"><div class="kicon">${ico}</div><div class="klabel">${lbl}</div><div class="kval">${fmtN(val)}</div><div class="ksub">${sub}</div></div>`;
  h += kc('c-t',  'REAL', 'Pend. Sin Duplicados', tA2.CantTkPend,      'Tickets únicos — dato real del sector');
  h += kc('c-v',  'PEND', 'Pendientes Total',      tA.CantTkPend,       'Tickets abiertos al cierre');
  h += kc('c-b',  'PROC', 'En Proceso',            tA.CantTkEnProc,     'Siendo atendidos ahora');
  h += kc('c-r',  'VENC', 'Vencidos (SLA)',         tA2.CantTkVenc || 0, 'Pendientes fuera de fecha/SLA');
  h += kc('c-o',  'ESPE', 'En Espera',             tA.CantTkEspera,     'Aguardando respuesta cliente');
  h += kc('c-g',  'SOL',  'Solucionados',           tA.CantTkSol,        'Cerrados en el periodo');
  h += `</div>`;

  // ── Gráficos ─────────────────────────────────────────────────────────
  h += `<div class="twocol">`;
  h += `<div class="card"><div class="card-title"><span class="dot"></span>Ranking Pendientes por Analista</div>
        <div style="position:relative;height:clamp(220px,36vw,340px)"><canvas id="cBar"></canvas></div></div>`;
  h += `<div class="card"><div class="card-title"><span class="dot dot-o"></span>Distribución de Estados — Internos</div>
        <div style="position:relative;height:clamp(220px,36vw,340px)"><canvas id="cStatus"></canvas></div></div>`;
  h += `</div>`;

  // ── Tabla detalle analistas ───────────────────────────────────────────
  h += `<div class="sec">Detalle por Analista <span class="sec-badge">Internos</span></div>`;
  h += `<div class="card" style="padding:20px 16px"><div class="tbl-wrap"><table class="tbl">`;
  h += `<thead><tr>
    <th>#</th><th>Analista</th>
    <th class="r">Pendientes</th><th class="r">En Proceso</th><th class="r">En Espera</th>
    <th class="r">Entregados</th><th class="r">Solucionados</th><th class="r">Vencidos</th>
    <th style="min-width:90px">Carga</th>
  </tr></thead><tbody>`;

  anas.forEach((r, i) => {
    const pc = r.CantTkPend > 20 ? 'chip-r' : r.CantTkPend > 10 ? 'chip-o' : 'chip-gr';
    const rbCls = i === 0 ? 'rb rb1' : i === 1 ? 'rb rb2' : i === 2 ? 'rb rb3' : 'rb rbn';
    h += `<tr>
      <td><span class="${rbCls}">${i+1}</span></td>
      <td style="font-weight:600;white-space:nowrap">${r.AnalistaProv.trim()}</td>
      <td class="r"><span class="chip ${pc}">${fmtN(r.CantTkPend)}</span></td>
      <td class="r">${fmtN(r.CantTkEnProc)}</td>
      <td class="r">${r.CantTkEspera > 0 ? `<span class="chip chip-o">${fmtN(r.CantTkEspera)}</span>` : fmtN(r.CantTkEspera)}</td>
      <td class="r">${fmtN(r.CantTkEntr)}</td>
      <td class="r"><span class="chip chip-g">${fmtN(r.CantTkSol)}</span></td>
      <td class="r">${r.CantTkVenc > 0 ? `<span class="chip chip-r">${fmtN(r.CantTkVenc)}</span>` : fmtN(r.CantTkVenc)}</td>
      <td><div class="pb-wrap"><div class="pb-bar" style="width:${Math.round(r.CantTkPend / maxP * 100)}%"></div></div></td>
    </tr>`;
  });

  // Fila TOTALES
  h += `<tr class="tr-tot">
    <td colspan="2">TOTALES</td>
    <td class="r">${fmtN(tA.CantTkPend)}</td>
    <td class="r">${fmtN(tA.CantTkEnProc)}</td>
    <td class="r">${fmtN(tA.CantTkEspera)}</td>
    <td class="r">${fmtN(tA.CantTkEntr)}</td>
    <td class="r">${fmtN(tA.CantTkSol)}</td>
    <td class="r">${fmtN(tA.CantTkVenc)}</td>
    <td></td>
  </tr>`;
  // Fila TOTALES SIN DUPLICADOS
  h += `<tr class="tr-tot2">
    <td colspan="2"><span class="chip chip-t">SIN DUPLICADOS</span></td>
    <td class="r"><strong>${fmtN(tA2.CantTkPend)}</strong></td>
    <td class="r">${fmtN(tA2.CantTkEnProc)}</td>
    <td class="r">${fmtN(tA2.CantTkEspera)}</td>
    <td class="r">${fmtN(tA2.CantTkEntr)}</td>
    <td class="r">${fmtN(tA2.CantTkSol)}</td>
    <td class="r"><span class="chip chip-r">${fmtN(tA2.CantTkVenc || 0)}</span></td>
    <td></td>
  </tr>`;
  h += `</tbody></table></div></div>`;

  // ── Proveedores Externos ──────────────────────────────────────────────
  h += `<div class="sec">Proveedores Externos <span class="sec-badge">Gr=AP</span></div>`;
  h += `<div class="prov-grid">`;
  provs.forEach(r => {
    const hasAlert = (r.CantTkPend || 0) > 0;
    h += `<div class="prov-card ${hasAlert ? 'alert' : 'ok'}">
      <div class="prov-name">${r.AnalistaProv.trim()}</div>
      <div class="prov-stats">
        <div class="prov-stat"><span class="prov-stat-lbl">Pendientes</span>
          <span class="prov-stat-val ${hasAlert ? 'chip chip-r' : ''}">${fmtN(r.CantTkPend)}</span></div>
        <div class="prov-stat"><span class="prov-stat-lbl">En Proceso</span>
          <span class="prov-stat-val">${fmtN(r.CantTkEnProc)}</span></div>
        <div class="prov-stat"><span class="prov-stat-lbl">Solucionados</span>
          <span class="prov-stat-val chip chip-g">${fmtN(r.CantTkSol)}</span></div>
      </div>
    </div>`;
  });
  // Tarjeta totales proveedores
  h += `<div class="prov-card prov-total-card">
    <div class="prov-name" style="color:var(--v)">&#931; Totales Proveedores</div>
    <div class="prov-stats">
      <div class="prov-stat"><span class="prov-stat-lbl">Pendientes</span>
        <span class="prov-stat-val ${(tAP.CantTkPend||0) > 0 ? 'chip chip-r' : ''}">${fmtN(tAP.CantTkPend)}</span></div>
      <div class="prov-stat"><span class="prov-stat-lbl">En Proceso</span>
        <span class="prov-stat-val">${fmtN(tAP.CantTkEnProc)}</span></div>
      <div class="prov-stat"><span class="prov-stat-lbl">Solucionados</span>
        <span class="prov-stat-val chip chip-g">${fmtN(tAP.CantTkSol)}</span></div>
    </div>
  </div>`;
  h += `</div>`;

  document.getElementById('mainContent').innerHTML = h;
  document.getElementById('foot').innerHTML =
    `Tablero APD &middot; REX &nbsp;|&nbsp; api.somosrex.com &nbsp;|&nbsp; ${nowStr()}`;

  // ── Chart: Barras horizontales ────────────────────────────────────────
  const names = anas.map(r => r.AnalistaProv.trim().split(' ').slice(0,2).join(' '));
  const pends = anas.map(r => r.CantTkPend);
  const totalPends = pends.reduce((a,b) => a+b, 0);
  const bClrs = pends.map((_, i) => `rgba(111,5,193,${1 - i / Math.max(pends.length - 1, 1) * 0.65})`);

  chartBar = new Chart(document.getElementById('cBar'), {
    type: 'bar',
    data: { labels: names, datasets: [{ label:'Pendientes', data:pends, backgroundColor:bClrs, borderRadius:5, borderSkipped:false }] },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      layout: { padding: { right: 95 } },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${c.raw} pendientes` } },
        datalabels: {
          anchor: 'end', align: 'end',
          formatter: (value) => {
            const pct = totalPends > 0 ? ((value / totalPends) * 100).toFixed(1) : 0;
            return `${value}  (${pct}%)`;
          },
          color: '#1D1D1B',
          font: { weight: '700', size: 10 }
        }
      },
      scales: {
        x: { grid:{color:'#E8E8E8'}, ticks:{color:'#5A5A6A',font:{size:10}}, max: Math.max(...pends) * 1.5 },
        y: { grid:{display:false}, ticks:{color:'#1D1D1B',font:{size:11,weight:'600'}} }
      }
    }
  });

  // ── Chart: Donut estados ─────────────────────────────────────────────
  chartStatus = new Chart(document.getElementById('cStatus'), {
    type: 'doughnut',
    data: {
      labels: ['En Proceso','En Espera','Entregados','Solucionados','Vencidos'],
      datasets: [{
        data: [tA.CantTkEnProc, tA.CantTkEspera, tA.CantTkEntr, tA.CantTkSol, tA2.CantTkVenc || 0],
        backgroundColor: ['#2957FF','#FF8C00','#9B3FDE','#1DB954','#E22626'],
        borderWidth: 2, borderColor: '#fff'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'right', labels: { font:{size:11}, padding:12 } },
        datalabels: {
          display: ctx => ctx.dataset.data[ctx.dataIndex] > 0,
          formatter: (value, ctx) => {
            const total = ctx.dataset.data.reduce((a,b) => a+b, 0);
            const pct = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
            return `${value}\n${pct}%`;
          },
          color: '#fff',
          font: { weight: '700', size: 11 },
          textAlign: 'center'
        }
      }
    }
  });
}

// ── Evolución: control ────────────────────────────────────────────────
function setEvoPeriod(p) {
  evoPeriod = p;
  destroyCharts();
  loadEvolution();
}
function setEvoView(v) {
  evoViewMode = v;
  destroyCharts();
  if (evoCache[evoPeriod]) {
    renderEvolution(evoCache[evoPeriod]);
  }
}
function setAnaMetric(m) {
  anaMetric = m;
  destroyCharts();
  if (evoCache[evoPeriod]) {
    renderEvolution(evoCache[evoPeriod]);
  }
}

// ── Evolución: carga ─────────────────────────────────────────────────
async function loadEvolution() {
  document.getElementById('foot').innerHTML = '';

  try {
    const periods = evoPeriod === 'sem' ? getWeeks(4) : getMonths(4);

    if (!evoCache[evoPeriod]) {
      const results = [];
      for (let i = 0; i < periods.length; i++) {
        document.getElementById('mainContent').innerHTML =
          `<div class="loader"><div class="spin"></div><span>Cargando período ${i + 1} de ${periods.length}&hellip;</span></div>`;
        const data = await fetchPeriod(periods[i]);
        results.push(data);
      }
      evoCache[evoPeriod] = periods.map((p, i) => ({ period: p, data: results[i] }));
    }

    renderEvolution(evoCache[evoPeriod]);
  } catch(e) {
    showError(e.message);
  }
}

// ── Evolución: renderizado ────────────────────────────────────────────
function renderEvolution(items) {
  // ordered = más antiguo [0] → más reciente [lastIdx]
  const ordered = [...items].reverse();
  const labels  = ordered.map(it => it.period.labelShort);
  const lastIdx = ordered.length - 1;
  const periodWord = evoPeriod === 'sem' ? 'semana' : 'mes';

  // ── Métricas de sector por período ───────────────────────────────
  const sinDup   = ordered.map(it => { const g=it.data.filter(r=>r.Gr==='A'); return (g.find(r=>r.Od==92)||{}).CantTkPend||0; });
  const totPend  = ordered.map(it => { const g=it.data.filter(r=>r.Gr==='A'); return (g.find(r=>r.Od==90)||{}).CantTkPend||0; });
  const enProc   = ordered.map(it => { const g=it.data.filter(r=>r.Gr==='A'); return (g.find(r=>r.Od==90)||{}).CantTkEnProc||0; });
  const solucion = ordered.map(it => { const g=it.data.filter(r=>r.Gr==='A'); return (g.find(r=>r.Od==90)||{}).CantTkSol||0; });
  const vencidos = ordered.map(it => { const g=it.data.filter(r=>r.Gr==='A'); return (g.find(r=>r.Od==92)||{}).CantTkVenc||0; });
  const entrantes= ordered.map(it => { const g=it.data.filter(r=>r.Gr==='A'); return (g.find(r=>r.Od==90)||{}).CantTkEntr||0; });

  // ── Datos por analista: promedio + variación + orden por último período ─
  const allAnasSet = new Set();
  ordered.forEach(it => it.data.filter(r=>r.Gr==='A'&&r.Od!=90&&r.Od!=92).forEach(r=>allAnasSet.add(r.AnalistaProv.trim())));
  const anaData = [...allAnasSet].map(name => {
    const getRow = it => it.data.find(r=>r.Gr==='A'&&r.Od!=90&&r.Od!=92&&r.AnalistaProv.trim()===name);
    const vals  = ordered.map(it => { const r=getRow(it); return r?(r.CantTkPend||0):0; });
    const entrs = ordered.map(it => { const r=getRow(it); return r?(r.CantTkEntr||0):0; });
    const sols  = ordered.map(it => { const r=getRow(it); return r?(r.CantTkSol||0):0;  });
    const lastVal  = vals[lastIdx];
    const firstVal = vals[0];
    const avg      = Math.round(vals.reduce((s,v)=>s+v,0)  / vals.length  * 10) / 10;
    const avgEntr  = Math.round(entrs.reduce((s,v)=>s+v,0) / entrs.length * 10) / 10;
    const avgSol   = Math.round(sols.reduce((s,v)=>s+v,0)  / sols.length  * 10) / 10;
    const varVal   = lastVal - firstVal;
    return { name, vals, entrs, sols, lastVal, firstVal, avg, avgEntr, avgSol, varVal };
  }).sort((a,b) => b.lastVal - a.lastVal); // Descendente por último período

  // ── Controles ────────────────────────────────────────────────────
  let h = '';
  h += `<div class="evo-controls">
    <span class="evo-label">Período:</span>
    <div class="ptabs">
      <button class="ptab ${evoPeriod==='sem'?'active':''}" onclick="setEvoPeriod('sem')">Últimas 4 Semanas</button>
      <button class="ptab ${evoPeriod==='mes'?'active':''}" onclick="setEvoPeriod('mes')">Últimos 4 Meses</button>
    </div>
    <div class="pbar-sep"></div>
    <span class="evo-label">Vista:</span>
    <div class="ptabs">
      <button class="ptab ${evoViewMode==='sector'?'active':''}" onclick="setEvoView('sector')">Totales Sector</button>
      <button class="ptab ${evoViewMode==='analistas'?'active':''}" onclick="setEvoView('analistas')">Por Analista</button>
    </div>
  </div>`;

  if (evoViewMode === 'sector') {
    // ── SECTOR: tabla → gráfico → conclusiones ────────────────────
    h += `<div class="sec">Detalle por Período</div>`;
    h += `<div class="card" style="padding:20px 16px"><div class="tbl-wrap"><table class="tbl">
      <thead><tr>
        <th>Período</th>
        <th class="r">Pend. Sin Dup</th><th class="r">Pend. Total</th>
        <th class="r">En Proceso</th><th class="r">Vencidos</th><th class="r">Entrantes</th><th class="r">Solucionados</th>
      </tr></thead><tbody>`;
    // Períodos en orden descendente (más reciente primero)
    [...Array(ordered.length).keys()].reverse().forEach(idx => {
      const it = ordered[idx];
      const isLast = idx === lastIdx;
      const rowStyle = isLast ? ' style="background:linear-gradient(90deg,#e6f5f2,#d8f0ec)!important;font-weight:600"' : '';
      h += `<tr${rowStyle}>
        <td style="font-weight:600">${it.period.label.replace(' (última cerrada)','')}</td>
        <td class="r"><span class="chip chip-t">${fmtN(sinDup[idx])}</span></td>
        <td class="r">${fmtN(totPend[idx])}</td>
        <td class="r">${fmtN(enProc[idx])}</td>
        <td class="r">${vencidos[idx]>0?`<span class="chip chip-r">${fmtN(vencidos[idx])}</span>`:fmtN(vencidos[idx])}</td>
        <td class="r">${fmtN(entrantes[idx])}</td>
        <td class="r"><span class="chip chip-g">${fmtN(solucion[idx])}</span></td>
      </tr>`;
    });
    h += `</tbody></table></div></div>`;
    h += `<div class="card">
      <div class="card-title"><span class="dot dot-t"></span>Evolución de Pendientes — Sector (Gr=A)</div>
      <div style="position:relative;height:300px"><canvas id="cEvoSec"></canvas></div>
    </div>`;
    h += buildSectorConclusions(sinDup, totPend, enProc, solucion, vencidos, ordered, periodWord, lastIdx);

  } else {
    // ── ANALISTAS ──────────────────────────────────────────────────

    // Helper delta inline
    const mkDelta = d => {
      if (d > 0) return `<span style="font-size:.72em;color:#E22626;font-weight:700;display:block;line-height:1.3">&#9650;+${d}</span>`;
      if (d < 0) return `<span style="font-size:.72em;color:#1DB954;font-weight:700;display:block;line-height:1.3">&#9660;${d}</span>`;
      return `<span style="font-size:.72em;color:#999;display:block;line-height:1.3">—</span>`;
    };

    // Selector de métrica
    h += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:18px;flex-wrap:wrap">
      <span class="evo-label">Métrica:</span>
      <div class="ptabs">
        <button class="ptab ${anaMetric==='pend'?'active':''}" onclick="setAnaMetric('pend')">Pendientes</button>
        <button class="ptab ${anaMetric==='entrsol'?'active':''}" onclick="setAnaMetric('entrsol')">Entrantes / Resueltos</button>
      </div>
    </div>`;

    if (anaMetric === 'pend') {
      // ── PENDIENTES ────────────────────────────────────────────────
      h += `<div class="sec">Pendientes por Analista <span class="sec-badge">Ordenado por período más reciente · ${ordered[lastIdx].period.labelShort}</span></div>`;
      h += `<div class="card" style="padding:20px 16px"><div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>#</th><th>Analista</th>`;
      ordered.forEach(it => { h += `<th class="r">${it.period.labelShort}</th>`; });
      h += `<th class="r" style="color:#ffffff">Promedio</th></tr></thead><tbody>`;

      anaData.forEach((a, i) => {
        const rbCls = i===0?'rb rb1':i===1?'rb rb2':i===2?'rb rb3':'rb rbn';
        h += `<tr><td><span class="${rbCls}">${i+1}</span></td>
          <td style="font-weight:600;white-space:nowrap">${a.name}</td>`;
        a.vals.forEach((v, vi) => {
          const isLast = vi === lastIdx;
          const cell = v > 0 ? fmtN(v) : '—';
          const dHtml = vi > 0 ? mkDelta(v - a.vals[vi-1]) : '';
          h += isLast
            ? `<td class="r"><strong>${cell}</strong>${dHtml}</td>`
            : `<td class="r" style="color:var(--txt2)">${cell}${dHtml}</td>`;
        });
        h += `<td class="r"><span class="chip chip-t">${fmtN(a.avg)}</span></td></tr>`;
      });

      // Fila promedio sector
      h += `<tr class="tr-tot"><td colspan="2">Promedio del Sector</td>`;
      const periodAvgs = ordered.map((_, idx) =>
        anaData.length ? Math.round(anaData.reduce((s,a)=>s+a.vals[idx],0)/anaData.length*10)/10 : 0
      );
      periodAvgs.forEach((avg, idx) => {
        const dHtml = idx > 0 ? mkDelta(Math.round((avg - periodAvgs[idx-1])*10)/10) : '';
        h += `<td class="r">${fmtN(avg)}${dHtml}</td>`;
      });
      const globalAvg = anaData.length ? Math.round(anaData.reduce((s,a)=>s+a.avg,0)/anaData.length*10)/10 : 0;
      h += `<td class="r"><span class="chip chip-t">${fmtN(globalAvg)}</span></td></tr>`;
      h += `</tbody></table></div></div>`;

      // Gráfico líneas pendientes por analista
      h += `<div class="card">
        <div class="card-title"><span class="dot"></span>Evolución de Pendientes por Analista</div>
        <div style="position:relative;height:clamp(280px,42vw,420px)"><canvas id="cEvoAna"></canvas></div>
      </div>`;

    } else {
      // ── ENTRANTES / RESUELTOS ─────────────────────────────────────
      h += `<div class="sec">Entrantes / Resueltos por Analista <span class="sec-badge">Período más reciente · ${ordered[lastIdx].period.labelShort}</span></div>`;
      h += `<div class="card" style="padding:20px 16px"><div class="tbl-wrap"><table class="tbl">
        <thead>
          <tr><th>#</th><th>Analista</th>`;
      ordered.forEach(it => { h += `<th class="r" colspan="2">${it.period.labelShort}</th>`; });
      h += `<th class="r" colspan="2" style="color:#ffffff">Promedio</th></tr>
          <tr style="background:rgba(0,0,0,.04)"><th></th><th></th>`;
      ordered.forEach(() => {
        h += `<th class="r" style="font-size:.72em;color:#6F05C1;padding-bottom:6px">Ent.</th>`;
        h += `<th class="r" style="font-size:.72em;color:#0D9E44;padding-bottom:6px">Sol.</th>`;
      });
      h += `<th class="r" style="font-size:.72em;color:#6F05C1;padding-bottom:6px">Ent.</th>`;
      h += `<th class="r" style="font-size:.72em;color:#0D9E44;padding-bottom:6px">Sol.</th>`;
      h += `</tr></thead><tbody>`;

      anaData.forEach((a, i) => {
        const rbCls = i===0?'rb rb1':i===1?'rb rb2':i===2?'rb rb3':'rb rbn';
        h += `<tr><td><span class="${rbCls}">${i+1}</span></td>
          <td style="font-weight:600;white-space:nowrap">${a.name}</td>`;
        ordered.forEach((_, vi) => {
          const ev = a.entrs[vi], sv = a.sols[vi];
          const isLast = vi === lastIdx;
          const eHtml = vi>0 ? mkDelta(ev - a.entrs[vi-1]) : '';
          const sHtml = vi>0 ? mkDelta(sv - a.sols[vi-1])  : '';
          const sty   = isLast ? 'font-weight:700' : 'color:var(--txt2)';
          h += `<td class="r" style="${sty}">${ev>0?fmtN(ev):'—'}${eHtml}</td>`;
          h += `<td class="r" style="${sty}">${sv>0?fmtN(sv):'—'}${sHtml}</td>`;
        });
        h += `<td class="r"><span class="chip chip-v">${fmtN(a.avgEntr)}</span></td>`;
        h += `<td class="r"><span class="chip chip-g">${fmtN(a.avgSol)}</span></td></tr>`;
      });

      // Fila totales sector
      h += `<tr class="tr-tot"><td colspan="2">Total Sector</td>`;
      ordered.forEach((_, idx) => {
        const totE = anaData.reduce((s,a)=>s+a.entrs[idx],0);
        const totS = anaData.reduce((s,a)=>s+a.sols[idx],0);
        const prevE = idx>0 ? anaData.reduce((s,a)=>s+a.entrs[idx-1],0) : null;
        const prevS = idx>0 ? anaData.reduce((s,a)=>s+a.sols[idx-1],0)  : null;
        h += `<td class="r">${fmtN(totE)}${prevE!==null?mkDelta(totE-prevE):''}</td>`;
        h += `<td class="r">${fmtN(totS)}${prevS!==null?mkDelta(totS-prevS):''}</td>`;
      });
      const gAvgE = anaData.length ? Math.round(anaData.reduce((s,a)=>s+a.avgEntr,0)/anaData.length*10)/10 : 0;
      const gAvgS = anaData.length ? Math.round(anaData.reduce((s,a)=>s+a.avgSol,0) /anaData.length*10)/10 : 0;
      h += `<td class="r"><span class="chip chip-v">${fmtN(gAvgE)}</span></td>`;
      h += `<td class="r"><span class="chip chip-g">${fmtN(gAvgS)}</span></td></tr>`;
      h += `</tbody></table></div></div>`;

      // Gráfico barras horizontales: Ent vs Sol por analista (último período)
      const anaH = Math.max(anaData.length, 3) * 52;
      h += `<div class="card">
        <div class="card-title"><span class="dot dot-o"></span>Entrantes vs Resueltos por Analista — ${ordered[lastIdx].period.labelShort}</div>
        <div style="position:relative;height:${anaH}px"><canvas id="cEvoAna"></canvas></div>
      </div>`;
    }

    // Gráfico balance Entrantes vs Solucionados sector (siempre visible)
    h += `<div class="card">
      <div class="card-title"><span class="dot dot-o"></span>Entrantes vs Solucionados — Sector</div>
      <div style="position:relative;height:clamp(220px,32vw,300px)"><canvas id="cEvoBalance"></canvas></div>
    </div>`;

    h += buildAnalystConclusions(anaData, ordered, periodWord, lastIdx);
  }

  document.getElementById('mainContent').innerHTML = h;
  document.getElementById('foot').innerHTML = `Tablero APD &middot; REX &nbsp;|&nbsp; Evolución &nbsp;|&nbsp; ${nowStr()}`;

  // ── Gráficos ─────────────────────────────────────────────────────
  if (evoViewMode === 'sector') {
    chartEvoSec = new Chart(document.getElementById('cEvoSec'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label:'Pend. Sin Dup', data:sinDup,   borderColor:'#007A6E', backgroundColor:'rgba(0,122,110,.10)', fill:true,  tension:.35, borderWidth:3, pointRadius:6, pointBackgroundColor:'#007A6E' },
          { label:'Pend. Total',   data:totPend,  borderColor:'#6F05C1', backgroundColor:'transparent', fill:false, tension:.35, borderWidth:2, borderDash:[5,4], pointRadius:5, pointBackgroundColor:'#6F05C1' },
          { label:'En Proceso',    data:enProc,   borderColor:'#2957FF', backgroundColor:'transparent', fill:false, tension:.35, borderWidth:2, pointRadius:5, pointBackgroundColor:'#2957FF' },
          { label:'Entrantes',     data:entrantes,borderColor:'#FF8C00', backgroundColor:'transparent', fill:false, tension:.35, borderWidth:2, borderDash:[4,3], pointRadius:5, pointBackgroundColor:'#FF8C00' },
          { label:'Solucionados',  data:solucion, borderColor:'#1DB954', backgroundColor:'transparent', fill:false, tension:.35, borderWidth:2, pointRadius:5, pointBackgroundColor:'#1DB954' },
          { label:'Vencidos',      data:vencidos, borderColor:'#E22626', backgroundColor:'transparent', fill:false, tension:.35, borderWidth:2, borderDash:[3,3], pointRadius:5, pointBackgroundColor:'#E22626' },
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend: { position:'bottom', labels:{font:{size:11},padding:16} },
          datalabels: { display:true, anchor:'end', align:'top', formatter:v=>v>0?v:'', color:ctx=>ctx.dataset.borderColor, font:{weight:'700',size:10} }
        },
        scales: {
          x: { grid:{color:'#E8E8E8'}, ticks:{font:{size:11}} },
          y: { grid:{color:'#E8E8E8'}, ticks:{font:{size:10}}, beginAtZero:true }
        }
      }
    });
  } else {
    if (anaMetric === 'pend') {
      // Líneas de pendientes por analista
      const datasets = anaData.map((a, i) => {
        const color = ANA_COLORS[i % ANA_COLORS.length];
        return {
          label: a.name.split(' ').slice(0,2).join(' '),
          data: a.vals,
          borderColor: color, backgroundColor:'transparent',
          tension:.35, borderWidth:2, pointRadius:5, pointBackgroundColor:color
        };
      });
      chartEvoAna = new Chart(document.getElementById('cEvoAna'), {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive:true, maintainAspectRatio:false,
          plugins: {
            legend: { position:'bottom', labels:{font:{size:10},padding:10,boxWidth:12} },
            datalabels: { display:false }
          },
          scales: {
            x: { grid:{color:'#E8E8E8'}, ticks:{font:{size:11}} },
            y: { grid:{color:'#E8E8E8'}, ticks:{font:{size:10}}, beginAtZero:true }
          }
        }
      });
    } else {
      // Barras horizontales: Entrantes vs Resueltos por analista (último período)
      chartEvoAna = new Chart(document.getElementById('cEvoAna'), {
        type: 'bar',
        data: {
          labels: anaData.map(a => a.name.split(' ').slice(0,2).join(' ')),
          datasets: [
            { label:'Entrantes', data:anaData.map(a=>a.entrs[lastIdx]),
              backgroundColor:'rgba(111,5,193,.75)', borderColor:'#6F05C1', borderWidth:2, borderRadius:5 },
            { label:'Resueltos', data:anaData.map(a=>a.sols[lastIdx]),
              backgroundColor:'rgba(29,185,84,.75)', borderColor:'#1DB954', borderWidth:2, borderRadius:5 }
          ]
        },
        options: {
          indexAxis: 'y',
          responsive:true, maintainAspectRatio:false,
          plugins: {
            legend: { position:'bottom', labels:{font:{size:11},padding:16,boxWidth:14} },
            datalabels: { display:true, anchor:'end', align:'right', formatter:v=>v>0?v:'',
              font:{weight:'700',size:10}, color:ctx=>ctx.dataset.borderColor }
          },
          scales: {
            x: { grid:{color:'#E8E8E8'}, ticks:{font:{size:10}}, beginAtZero:true },
            y: { grid:{color:'#E8E8E8'}, ticks:{font:{size:10}} }
          }
        }
      });
    }

    // Balance Entrantes vs Solucionados sector (siempre visible)
    chartEvoBalance = new Chart(document.getElementById('cEvoBalance'), {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label:'Entrantes', data:entrantes,
            backgroundColor:'rgba(111,5,193,.75)', borderColor:'#6F05C1', borderWidth:2, borderRadius:5 },
          { label:'Solucionados', data:solucion,
            backgroundColor:'rgba(29,185,84,.75)', borderColor:'#1DB954', borderWidth:2, borderRadius:5 }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: {
          legend: { position:'bottom', labels:{font:{size:11},padding:16,boxWidth:14} },
          datalabels: { display:true, anchor:'end', align:'top', formatter:v=>v>0?v:'',
            font:{weight:'700',size:11}, color:ctx=>ctx.dataset.borderColor }
        },
        scales: {
          x: { grid:{color:'#E8E8E8'}, ticks:{font:{size:11}} },
          y: { grid:{color:'#E8E8E8'}, ticks:{font:{size:10}}, beginAtZero:true }
        }
      }
    });
  }
}

// ── Conclusiones: Sector ─────────────────────────────────────────────
function buildSectorConclusions(sinDup, totPend, enProc, solucion, vencidos, ordered, periodWord, lastIdx) {
  const lastSD = sinDup[lastIdx],  firstSD = sinDup[0],   deltaSD = lastSD - firstSD;
  const lastV  = vencidos[lastIdx],firstV  = vencidos[0], deltaV  = lastV  - firstV;
  const lastS  = solucion[lastIdx],firstS  = solucion[0], deltaS  = lastS  - firstS;
  const lastEP = enProc[lastIdx],  lastTP  = totPend[lastIdx];
  const lastLabel  = ordered[lastIdx].period.labelShort;
  const firstLabel = ordered[0].period.labelShort;
  const pctSinDup  = lastTP > 0 ? Math.round(lastSD / lastTP * 100) : 0;
  const nPer = ordered.length;

  const items = [];

  // Tendencia Sin Dup
  if (Math.abs(deltaSD) <= 2) {
    items.push({ cls:'info', icon:'↔', text:`<strong>Carga estable:</strong> Los tickets pendientes sin duplicados se mantienen sin variación significativa en los ${nPer} períodos analizados (${fmtN(firstSD)} → ${fmtN(lastSD)}).` });
  } else if (deltaSD > 0) {
    items.push({ cls:'bad', icon:'↑', text:`<strong>Carga en aumento:</strong> Los pendientes sin duplicados subieron <strong>+${deltaSD}</strong> entre ${firstLabel} y ${lastLabel} (${fmtN(firstSD)} → ${fmtN(lastSD)}). Se recomienda revisar la priorización y la capacidad del equipo.` });
  } else {
    items.push({ cls:'ok', icon:'↓', text:`<strong>Carga en descenso:</strong> Los pendientes sin duplicados bajaron <strong>${deltaSD}</strong> entre ${firstLabel} y ${lastLabel} (${fmtN(firstSD)} → ${fmtN(lastSD)}). El equipo está resolviendo más de lo que ingresa.` });
  }

  // Vencidos
  if (lastV === 0) {
    items.push({ cls:'ok', icon:'✓', text:`<strong>Sin vencimientos en el último ${periodWord}:</strong> El sector cumple los SLA establecidos. Mantener el seguimiento preventivo.` });
  } else if (deltaV > 2) {
    items.push({ cls:'bad', icon:'!', text:`<strong>Vencidos en aumento:</strong> Subieron +${deltaV} en el período analizado (${fmtN(firstV)} → ${fmtN(lastV)}). Revisar asignaciones, fechas estimadas y tickets tipo PRJ / Mejoras con fecha comprometida.` });
  } else if (deltaV < -2) {
    items.push({ cls:'ok', icon:'↓', text:`<strong>Vencidos en descenso:</strong> Bajaron ${deltaV} (${fmtN(firstV)} → ${fmtN(lastV)}). Mejora en el cumplimiento de SLA.` });
  } else {
    items.push({ cls:'warn', icon:'~', text:`<strong>Vencidos estables con pendientes:</strong> Hay <strong>${fmtN(lastV)}</strong> tickets vencidos en ${lastLabel} sin variación significativa. Son tickets en proceso que superaron su fecha estimada o SLA.` });
  }

  // Solucionados
  if (deltaS > 2) {
    items.push({ cls:'ok', icon:'↑', text:`<strong>Resolución en aumento:</strong> Los tickets solucionados subieron +${deltaS} (${fmtN(firstS)} → ${fmtN(lastS)}). El equipo está mostrando mayor productividad.` });
  } else if (deltaS < -2) {
    items.push({ cls:'warn', icon:'↓', text:`<strong>Resolución en descenso:</strong> Los tickets solucionados bajaron ${deltaS} (${fmtN(firstS)} → ${fmtN(lastS)}). Verificar si hubo menor ingreso de tickets o menor capacidad disponible.` });
  } else {
    items.push({ cls:'info', icon:'↔', text:`<strong>Resolución estable:</strong> Los tickets solucionados se mantienen alrededor de ${fmtN(lastS)} por ${periodWord} en el período analizado.` });
  }

  // Estado actual
  items.push({ cls:'neutral', icon:'📊', text:`<strong>Estado actual — ${lastLabel}:</strong> ${fmtN(lastSD)} tickets únicos pendientes (${pctSinDup}% del total bruto), ${fmtN(lastEP)} en proceso activo y ${fmtN(lastV)} vencidos.` });

  return buildConclBox('Conclusiones del Período', items);
}

// ── Conclusiones: Por Analista ───────────────────────────────────────
function buildAnalystConclusions(anaData, ordered, periodWord, lastIdx) {
  if (!anaData.length) return '';
  const lastLabel = ordered[lastIdx].period.labelShort;
  const top       = anaData[0];
  const bottom    = anaData[anaData.length - 1];
  const byVar     = [...anaData].sort((a,b) => b.varVal - a.varVal);
  const mostWorse = byVar[0];
  const mostImprv = byVar[byVar.length - 1];
  const activeAnas = anaData.filter(a => a.lastVal > 0);
  const sectorAvg  = activeAnas.length ? Math.round(activeAnas.reduce((s,a)=>s+a.lastVal,0) / activeAnas.length) : 0;
  const aboveAvg   = activeAnas.filter(a => a.lastVal > sectorAvg).length;
  const nActive    = activeAnas.length;

  const items = [];

  // Analista con mayor carga
  items.push({
    cls: top.lastVal > 20 ? 'bad' : top.lastVal > 10 ? 'warn' : 'info',
    icon: '↑',
    text: `<strong>Mayor carga en ${lastLabel}:</strong> <strong>${top.name}</strong> con ${fmtN(top.lastVal)} tickets pendientes (promedio ${periodWord}al: ${fmtN(top.avg)}).`
  });

  // Analista con menor carga (solo si distinto y tiene tickets)
  if (bottom.lastVal > 0 && bottom.name !== top.name) {
    items.push({
      cls: 'ok', icon: '↓',
      text: `<strong>Menor carga en ${lastLabel}:</strong> <strong>${bottom.name}</strong> con ${fmtN(bottom.lastVal)} tickets pendientes.`
    });
  }

  // Mayor deterioro (subió más)
  if (mostWorse.varVal > 2) {
    items.push({
      cls: 'bad', icon: '!',
      text: `<strong>Mayor aumento de carga:</strong> <strong>${mostWorse.name}</strong> incrementó <strong>+${mostWorse.varVal}</strong> tickets respecto al primer ${periodWord} analizado (${fmtN(mostWorse.firstVal)} → ${fmtN(mostWorse.lastVal)}).`
    });
  }

  // Mayor mejora (bajó más)
  if (mostImprv.varVal < -2) {
    items.push({
      cls: 'ok', icon: '↓',
      text: `<strong>Mayor reducción de carga:</strong> <strong>${mostImprv.name}</strong> redujo <strong>${mostImprv.varVal}</strong> tickets respecto al primer ${periodWord} analizado (${fmtN(mostImprv.firstVal)} → ${fmtN(mostImprv.lastVal)}).`
    });
  }

  // Distribución respecto al promedio
  items.push({
    cls: 'info', icon: '📊',
    text: `<strong>Distribución del equipo — ${lastLabel}:</strong> Promedio del sector: <strong>${fmtN(sectorAvg)}</strong> tickets/analista. ${aboveAvg} de ${nActive} analistas activos están por encima del promedio${aboveAvg > nActive / 2 ? ' — la carga está concentrada en pocos analistas.' : '.'}`
  });

  return buildConclBox('Conclusiones y Análisis del Equipo', items);
}

// ── Helper para construir el bloque de conclusiones ──────────────────
function buildConclBox(title, items) {
  let h = `<div class="concl-box"><div class="concl-title">&#128202;&nbsp; ${title}</div>`;
  items.forEach(it => {
    h += `<div class="concl-item concl-${it.cls}">${it.text}</div>`;
  });
  h += `</div>`;
  return h;
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML =
    `<div class="errbox"><strong>Error de conexión</strong><br>${msg}</div>`;
}

populateSelect();
loadData();
</script>
